    # Volumes - IMPORTANT: Montez votre code source ici !
    volumes:
      # ⚠️ MODIFIER CE CHEMIN avec le chemin vers VOTRE code sx1302_hal modifié
      - ./config/custom:/opt/sx1302_hal/config:rw
      - ./logs/custom:/opt/sx1302_hal/logs:rw
      - /sys/class/gpio:/sys/class/gpio:rw
    
    # Dépend de Mosquitto
    depends_on:
      - mosquitto
    
    # Réseau bridge pour communiquer avec Mosquitto
    networks:
      - lora-network
    
    # Ports UDP pour LoRaWAN (si vous voulez aussi TTN/ChirpStack)
    ports:
      - "1700:1700/udp"
    
    # Healthcheck
    healthcheck:
      test: ["CMD", "pgrep", "-f", "lora_pkt_fwd"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Client MQTT pour monitoring (optionnel)
  mqtt-monitor:
    image: eclipse-mosquitto:latest
    container_name: mqtt_monitor
    restart: "no"
    depends_on:
      - mosquitto
    networks:
      - lora-network
    command: >
      mosquitto_sub -h mosquitto -t "lora/#" -v
    profiles:
      - monitoring

networks:
  lora-network:
     external: true
     name: lora-network

